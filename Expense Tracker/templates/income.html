{% extends "base.html" %}

{% block content %}

<div class="hero mb-4">
    <div class="d-flex justify-content-between align-items-center flex-wrap">
        <div>
            <h2>💰 Income Dashboard</h2>
            <p class="mb-0">Manage all your income records.</p>
            <br>
              <a href="{{ url_for('add_income') }}" class="btn btn-success">
            + Add Income
        </a>
        </div>

        </a>
    </div>
</div>

<div class="glass">

    <div class="table-responsive">

        <table class="table table-hover align-middle">

            <thead class="table-primary">
                <tr>
                    <th>ID</th>
                    <th>Source</th>
                    <th>Amount</th>
                    <th>Date</th>
                    <th width="120">Action</th>
                </tr>
            </thead>

            <tbody>

            {% for income in incomes %}
                <tr>
                    <td>{{ loop.index }}</td>
                    <td>{{ income.source }}</td>
                    <td class="fw-bold text-success">
                        ₹ {{ income.amount }}
                    </td>
                    <td>{{ income.income_date }}</td>
                    <td>
                        <a href="{{ url_for('delete_income', id=income.id) }}"
                           class="btn btn-danger btn-sm delete-btn">
                            🗑 Delete
                        </a>
                    </td>
                </tr>
            {% endfor %}

            </tbody>

        </table>

    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    document.querySelectorAll("tbody tr").forEach((row, index) => {
        row.style.opacity = "0";
        row.style.transform = "translateY(20px)";

        setTimeout(() => {
            row.style.transition = "all .5s ease";
            row.style.opacity = "1";
            row.style.transform = "translateY(0)";
        }, index * 100);
    });

    document.querySelectorAll(".delete-btn").forEach(btn => {
        btn.addEventListener("click", function(e){
            e.preventDefault();

            const row = this.closest("tr");

            row.style.transition = "all .5s ease";
            row.style.opacity = "0";
            row.style.transform = "translateX(100px) scale(.8)";

            setTimeout(() => {
                window.location.href = this.href;
            }, 500);
        });
    });

});
</script>

{% endblock %}
