<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Dashboard Pro</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        /* ================= GLOBAL BASE STYLES ================= */
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #dbeafe, #e0f2fe, #bfdbfe);
            color: #0f172a;
            overflow-x: hidden;
            transition: background 0.4s, color 0.4s;
            min-height: 100vh;
        }

        /* DARK MODE IMPLEMENTATION */
        body.dark {
            background: linear-gradient(135deg, #0f172a, #020617, #111827);
            color: #f8fafc;
        }

        /* Animated Glowing Radial Background Layer */
        body::before {
            content: "";
            position: fixed;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.18), transparent 60%);
            animation: moveGlow 10s linear infinite;
            z-index: -1;
        }

        @keyframes moveGlow {
            0% { transform: translate(0, 0); }
            50% { transform: translate(5%, 5%); }
            100% { transform: translate(0, 0); }
        }

        /* ================= TOP STICKY BAR ================= */
        .topbar {
            height: 60px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            display: flex;
            align-items: center;
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 2000;
            border-bottom: 1px solid #93c5fd;
            transition: background 0.4s, border-color 0.4s;
        }

        body.dark .topbar {
            background: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid #1e3a8a;
        }

        /* Menu / Hamburger Button */
        .menu-btn {
            position: relative;
            font-size: 28px;
            cursor: pointer;
            border: none;
            background: none;
            color: #2563eb;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        body.dark .menu-btn {
            color: #60a5fa;
        }

        /* Glowing Orbiting Ring on Hover */
        .menu-btn::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 45px;
            height: 45px;
            border: 2px solid rgba(37, 99, 235, 0.4);
            border-top: 2px solid transparent;
            border-right: 2px solid transparent;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: halfOrbit 1.2s linear infinite;
            opacity: 0;
            transition: 0.3s;
        }

        .menu-btn:hover::before {
            opacity: 1;
        }

        @keyframes halfOrbit {
            0%   { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .menu-btn:hover {
            text-shadow: 0 0 10px rgba(37, 99, 235, 0.6), 0 0 25px rgba(37, 99, 235, 0.3);
            transform: scale(1.15);
        }

        /* ================= SIDEBAR NAV SYSTEM ================= */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            padding: 25px 20px;
            z-index: 3000;
            background: linear-gradient(180deg, #93c5fd, #dbeafe, #eff6ff);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-right: 1px solid #60a5fa;
            transition: 0.45s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            box-shadow: 10px 0 30px rgba(59, 130, 246, 0.25);
        }

        body.dark .sidebar {
            background: linear-gradient(180deg, #1e293b, #0f172a, #020617);
            border-right: 1px solid #1e3a8a;
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
        }

        .sidebar.open {
            left: 0;
        }

        /* Matches the layout style of your image header */
        .sidebar h3 {
            font-weight: 900;
            color: #2563eb;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 2px 4px rgba(37, 99, 235, 0.15);
        }

        body.dark .sidebar h3 {
            color: #3b82f6;
        }

        /* Custom Action Day/Night Toggle Button */
        .side-btn {
            width: 100%;
            border: none;
            padding: 12px;
            margin-bottom: 25px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .dark-btn {
            background: #1d4ed8;
            color: white;
            box-shadow: 0 4px 12px rgba(29, 78, 216, 0.3);
        }

        .dark-btn:hover {
            background: #1e40af;
            transform: scale(1.02);
        }

        body.dark .dark-btn {
            background: #3b82f6;
            color: #0f172a;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        /* Sidebar Nav Links */
        .sidebar a {
            display: block;
            padding: 12px 15px;
            margin: 8px 0;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            color: #0f172a;
            transition: 0.3s ease;
        }

        body.dark .sidebar a {
            color: #cbd5e1;
        }

        .sidebar a:hover {
            background: #ffffff;
            color: #2563eb;
            transform: translateX(8px);
        }

        body.dark .sidebar a:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }

        /* ================= BACKDROP OVERLAY ================= */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
            z-index: 2500;
        }

        .overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        /* ================= MAIN CONTENT SPACE ================= */
        .main {
             padding: 30px;
             margin-top: 20px;
            min-height: calc(100vh - 60px);
            transition: margin-left 0.45s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        /* Responsive spacing for desktop widths when sidebar remains open */
        @media (min-width: 992px) {
            .sidebar.open ~ .main {
                margin-left: 280px;
            }
        }

        /* ================= GLASSMORPHISM DASHBOARD CARDS ================= */
        .glass {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 18px;
            border: 1px solid #93c5fd;
            padding: 25px;
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.1);
            animation: floatCard 6s ease-in-out infinite;
        }

        body.dark .glass {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .glass:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 20px 40px rgba(59, 130, 246, 0.2);
        }

        @keyframes floatCard {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        /* Container Fade-In Animation */
        .fade-in {
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ================= TYPOGRAPHY & FLOATING TEXT EFFECT ================= */
        h2, h3, h4, h5 {
            font-weight: 900;
            letter-spacing: 0.5px;
            position: relative;
            animation: floatText 4s ease-in-out infinite;
        }

        h2 {
            text-shadow: 0 1px 0 #fff, 0 2px 3px rgba(0,0,0,0.15), 0 0 20px rgba(59,130,246,0.2);
        }

        body.dark h2 {
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }

        @keyframes floatText {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-3px); }
        }
        /* Income Table Animation */

.table {
    border-radius: 15px;
    overflow: hidden;
}

.table thead th {
    border: none;
    font-weight: 700;
}

.table tbody tr {
    transition: .3s;
}

.table tbody tr:hover {
    transform: scale(1.01);
    box-shadow: 0 8px 20px rgba(59,130,246,.15);
}

.delete-btn {
    transition: .3s;
}

.delete-btn:hover {
    transform: scale(1.08);
}
/* ===== Premium Sidebar Brand ===== */

/* Dark Mode */

  .profile-btn i{

}

@keyframes glowMove{

0%{
transform:rotate(0deg);

/* Hover */

transform:translateY(-12px) scale(1.04);

/* Amount */

/* Dark Mode */

body.dark .dashboard-card{

box-shadow:
0 20px 50px rgba(0,0,0,.45);

}

body.dark .welcome-title{

color:#93c5fd;

}

}

/* ================= Animated Dashboard Icons ================= */

    font-size:50px;
    display:inline-block;

    transition:.4s;
    filter: drop-shadow(0 8px 15px rgba(37,99,235,.25));

    transform:scale(1.15) rotate(-8deg);

    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <h3>💎 Finance Pro</h3>
     <!-- Day/Night Button -->
    <button class="side-btn dark-btn" id="themeBtn" onclick="toggleDark()">
        🌙 Night Mode
    </button>
       

        <a href="{{ url_for('dashboard') }}">🏠 Dashboard</a>
        <a href="{{ url_for('income') }}">💰 Income</a>
        <a href="{{ url_for('expenses') }}">💸 Expenses</a>
        <a href="{{ url_for('report') }}">📊 Reports</a> 
        <a href="{{ url_for('logout') }}">🚪 Logout</a>
    </div>

    <div class="topbar">
    <button class="menu-btn" onclick="toggleSidebar()" aria-label="Toggle Navigation Menu">☰</button>
    <h5 class="ms-3 mb-0"><b>Expense Tracker Pro</b></h5>

    <!-- Right Side Profile -->
   <div class="ms-auto">
    <a href="{{ url_for('profile') }}" class="profile-btn">
        <i class="bi bi-person-circle"></i>
        <span>{{ session['fullname'] }}</span>
    </a>
</div>
</div>

<!-- Main Page Content -->
<div class="main fade-in">

    {% block content %}
    {% endblock %}

</div>

<script>
    // Sidebar
    function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("open");
        document.getElementById("overlay").classList.toggle("show");
    }

    // Load saved theme
    window.onload = function () {
        const savedTheme = localStorage.getItem("theme");

        if (savedTheme === "dark") {
            document.body.classList.add("dark");
            document.getElementById("themeBtn").innerHTML = "☀️ Day Mode";
        } else {
            document.getElementById("themeBtn").innerHTML = "🌙 Night Mode";
        }
    };

    // Toggle Theme
    function toggleDark() {

        document.body.classList.toggle("dark");

        const btn = document.getElementById("themeBtn");

        if (document.body.classList.contains("dark")) {
            btn.innerHTML = "☀️ Day Mode";
            localStorage.setItem("theme", "dark");
        } else {
            btn.innerHTML = "🌙 Night Mode";
            localStorage.setItem("theme", "light");
        }
    }
</script>

</body>
</html>
