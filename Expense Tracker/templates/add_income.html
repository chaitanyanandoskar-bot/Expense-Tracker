<!DOCTYPE html>
<html>
<head>

<title>Add Income</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card mt-5">

<div class="card-header bg-success text-white">

<h3>Add Income</h3>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label>Income Source</label>

<input
type="text"
name="source"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Amount</label>

<input
type="number"
name="amount"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Date</label>

<input
type="date"
name="date"
class="form-control"
required>

</div>

<button class="btn btn-success">
Save Income
</button>

<a href="{{ url_for('income') }}" class="btn btn-secondary">
Cancel
</a>

</form>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
