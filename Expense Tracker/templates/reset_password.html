<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#e0f7ff,#b3e5ff,#81d4fa);
    font-family:Segoe UI,sans-serif;
}

.card{
    width:420px;
    padding:35px;
    border-radius:20px;
    background:rgba(255,255,255,.25);
    backdrop-filter:blur(15px);
    box-shadow:0 10px 40px rgba(0,0,0,.15);
}

.form-control{
    border-radius:12px;
    padding:12px;
    margin-bottom:15px;
}

.btn-custom{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#2196f3,#03a9f4);
    color:#fff;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="card">

<h2 class="text-center mb-3">Reset Password</h2>

<form method="POST">

<input
type="password"
name="password"
class="form-control"
placeholder="New Password"
required>

<input
type="password"
name="confirm_password"
class="form-control"
placeholder="Confirm Password"
required>

<button class="btn btn-custom">
Reset Password
</button>

</form>

</div>

</body>
</html>
