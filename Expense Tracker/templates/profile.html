<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Inter, sans-serif;
    background: radial-gradient(circle at top, #dbeafe, #eff6ff, #bfdbfe);
    overflow-x:hidden;
}

/* floating background glow */
body::before{
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    top:-50%;
    left:-50%;
    background:
        radial-gradient(circle at 20% 30%, rgba(59,130,246,0.25), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(147,197,253,0.25), transparent 45%);
    animation: floatGlow 10s infinite ease-in-out;
    z-index:-1;
}

@keyframes floatGlow{
    0%{transform:translate(0,0) scale(1);}
    50%{transform:translate(2%,3%) scale(1.05);}
    100%{transform:translate(0,0) scale(1);}
}

/* CARD STYLE */
.card{
    border:none;
    border-radius:22px;
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.75);
    box-shadow:0 20px 60px rgba(59,130,246,0.15);
    animation: floatCard 6s ease-in-out infinite;
}

@keyframes floatCard{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}

/* HEADER */
.card-header{
    border-radius:22px 22px 0 0 !important;
    background: linear-gradient(135deg,#2563eb,#60a5fa);
    border:none;
}

/* TABLE */
.table th{
    width:40%;
    color:#1d4ed8;
}

/* BUTTONS */
.btn{
    border-radius:12px;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}

/* PROFILE ICON */
.profile-icon{
    width:70px;
    height:70px;
    margin:auto;
    border-radius:50%;
    background: linear-gradient(135deg,#2563eb,#60a5fa);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    color:white;
    box-shadow:0 10px 25px rgba(37,99,235,0.4);
    margin-top:20px;
}
</style>

</head>

<body>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card">

<div class="card-header text-white text-center">
<h3>👤 User Profile</h3>
</div>

<div class="profile-icon">👤</div>

<div class="card-body">

<table class="table">

<tr>
<th>Name</th>
<td>{{ user.fullname }}</td>
</tr>

<tr>
<th>Email</th>
<td>{{ user.email }}</td>
</tr>

<tr>
<th>Total Income</th>
<td>₹ {{ total_income }}</td>
</tr>

<tr>
<th>Total Expense</th>
<td>₹ {{ total_expense }}</td>
</tr>

<tr>
<th>Current Balance</th>
<td>₹ {{ balance }}</td>
</tr>

</table>

<div class="d-flex justify-content-between">

<a href="{{ url_for('dashboard') }}" class="btn btn-primary">
🏠 Dashboard
</a>

<a href="{{ url_for('logout') }}" class="btn btn-danger">
🚪 Logout
</a>

</div>

</div>

</div>

</div>

</div>

</div>
</div>


</body>
</html>
</body>
</html>
