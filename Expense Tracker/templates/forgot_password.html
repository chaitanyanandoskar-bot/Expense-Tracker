<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    background: linear-gradient(135deg, #1b3c4d, #2c5364, #3b1d4a);
    font-family: "Inter", sans-serif;
}

/* GLASS CARD (bigger + smoother) */

/* ICON */
.icon {
    font-size: 42px;
    margin-bottom: 10px;
}

/* TITLE */
h2 {
    font-size: 24px;
    font-weight: 600;
}

/* INPUTS */
.form-control {
    background: rgba(255,255,255,0.15);
    border: none;
    border-radius: 10px;
    padding: 12px;
    color: white;
}

.form-control::placeholder {
    color: rgba(255,255,255,0.6);
}

.form-control:focus {
    box-shadow: 0 0 0 2px #00c6ff;
    background: rgba(255,255,255,0.2);
    color: white;
}

/* PRIMARY BUTTON (animated) */
.btn-primary {
    width: 100%;
    border-radius: 10px;
    padding: 12px;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    border: none;
    font-weight: 600;

    transition: all 0.25s ease;
}

.btn-primary:hover {
    transform: scale(1.03);
    box-shadow: 0 8px 20px rgba(0,198,255,0.4);
}

.btn-primary:active {
    transform: scale(0.98);
}

/* LOGIN BUTTON (styled like button + animated) */
.btn-link-custom {
    display: block;
    margin-top: 14px;
    padding: 10px;
    border-radius: 10px;

    font-size: 14px;
    color: #00c6ff;
    text-decoration: none;

    border: 1px solid rgba(0,198,255,0.5);
    transition: all 0.25s ease;
}

.btn-link-custom:hover {
    background: rgba(0,198,255,0.15);
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(0,198,255,0.2);
}

.btn-link-custom:active {
    transform: scale(0.98);
}

/* ANIMATION */
@keyframes fadeUp {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}
.form-control {
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(0, 198, 255, 0.6);
    border-radius: 12px;
    padding: 12px;
    color: white;

    transition: all 0.2s ease;

    /* base glow (already visible even when not focused) */
    box-shadow: 0 0 10px rgba(0,198,255,0.35);
}

/* placeholder */
.form-control::placeholder {
    color: rgba(255,255,255,0.6);
}

/* HOVER — stronger neon */
.form-control:hover {
    border-color: #00e5ff;
    box-shadow:
        0 0 15px rgba(0,229,255,0.7),
        0 0 30px rgba(0,198,255,0.6);
    transform: scale(1.02);
}

/* FOCUS — intense glow like your image */
.form-control:focus {
    outline: none;
    border-color: #00e5ff;
    background: rgba(255,255,255,0.15);

    box-shadow:
        0 0 0 2px rgba(0,229,255,0.9),
        0 0 25px rgba(0,229,255,1),
        0 0 60px rgba(0,198,255,0.8);
    
    transform: scale(1.03);
}
.icon {
    font-size: 42px;
    margin-bottom: 10px;
    display: inline-block;

    animation: lockPulse 2.5s ease-in-out infinite;
    text-shadow: 0 0 10px rgba(0,198,255,0.6);
}

/* subtle realistic animation (no layout shift) */
@keyframes lockPulse {
    0% {
        transform: scale(1);
        filter: drop-shadow(0 0 5px rgba(0,198,255,0.4));
    }
    50% {
        transform: scale(1.08);
        filter: drop-shadow(0 0 18px rgba(0,198,255,0.9));
    }
    100% {
        transform: scale(1);
        filter: drop-shadow(0 0 5px rgba(0,198,255,0.4));
    }
}
.card-box {
    width: 460px;
    min-height: 640px;
    padding: 50px 40px;

    border-radius: 18px;

    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(14px);

    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 18px 50px rgba(0,0,0,0.4);

    text-align: center;
    color: white;

    display: flex;
    flex-direction: column;
    justify-content: center;

    /* ❌ removed animation completely */
    animation: none;

    transition: none;
}

</style>
</head>

<body>

<div class="card-box">

    <div class="icon">🔐</div>

    <h2>Reset Password</h2>
    <p style="font-size:13px; opacity:0.8;">
        Enter your email and new password
    </p>

    <form method="POST">

        <div class="mb-3">
            <input type="email" name="email" class="form-control" placeholder="Email Address" required>
        </div>

        <div class="mb-3">
            <input type="password" name="new_password" class="form-control" placeholder="New Password" required>
        </div>

        <div class="mb-4">
            <input type="password" name="confirm_password" class="form-control" placeholder="Confirm Password" required>
        </div>

        <button class="btn btn-primary">
            Reset Password
        </button>

        <a href="/login" class="btn-link-custom">
            ⬅ Back to Login
        </a>

    </form>

</div>

</body>
</html>
